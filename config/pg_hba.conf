# CodeClarity Production PostgreSQL Host-Based Authentication
# All TCP connections require SSL (hostssl); unencrypted explicitly rejected

# TYPE       DATABASE        USER            ADDRESS                 METHOD

# Local connections (inside container)
local        all             all                                     scram-sha-256

# SSL-encrypted TCP connections from Docker network
hostssl      all             all             0.0.0.0/0               scram-sha-256
hostssl      all             all             ::/0                    scram-sha-256

# Explicitly reject unencrypted remote connections
hostnossl    all             all             0.0.0.0/0               reject
hostnossl    all             all             ::/0                    reject
