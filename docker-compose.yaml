name: codeclarity

services:
  rabbitmq:
    restart: always
    image: rabbitmq:4.2.3-management-alpine
    hostname: "codeclarity"
    env_file:
      - .env.amqp
    environment:
      - RABBITMQ_ENABLED_PLUGINS_FILE=/etc/rabbitmq/enabled_plugins
    command: |
      bash -c '
        rabbitmq-plugins enable rabbitmq_management rabbitmq_prometheus --offline &&
        exec docker-entrypoint.sh rabbitmq-server
      '
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 500M

  db:
    image: postgres:18.1-alpine
    restart: always
    # set shared memory limit when using docker-compose
    shm_size: 128mb
    volumes:
      - ./docker-entrypoint-initdb:/docker-entrypoint-initdb.d/
      - ./dump:/dump
      - db_data_container:/var/lib/postgresql/18
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    command: >
      postgres
        -c config_file=/etc/postgresql/postgresql.conf
        -c hba_file=/etc/postgresql/pg_hba.conf
    env_file:
      - .env.database
    environment:
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256

  api:
    image: codeclarityce/api
    env_file:
      - .env.api
      - .env.mail
      - .env.amqp
      - .env.database
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    volumes:
      - ./jwt:/home/codeclarity/app/jwt
      - .env.api:/home/codeclarity/app/env/.env.prod
      - projects:/home/codeclarity/private
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 500M

  frontend:
    image: codeclarityce/frontend
    env_file:
      - .env.frontend
    restart: always
    ports:
      # HTTP
      - target: 80
        published: ${HTTP_PORT:-80}
        protocol: tcp
      # HTTPS
      - target: 443
        published: ${HTTPS_PORT:-443}
        protocol: tcp
      # HTTP/3
      - target: 443
        published: ${HTTP3_PORT:-443}
        protocol: udp
      # API
      - target: 3000
        published: 3000
        protocol: tcp
      # API
      - target: 3001
        published: 3001
        protocol: tcp
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      # Uncomment the following line to use your own certificates
      # - ./certs:/etc/caddy/certs:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 500M

  service-dispatcher:
    image: codeclarityce/service-dispatcher
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    env_file:
      - .env.amqp
      - .env.database
      - .env.codeclarity
    volumes:
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 500M

  service-downloader:
    image: codeclarityce/service-downloader
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    env_file:
      - .env.amqp
      - .env.database
      - .env.codeclarity
    volumes:
      - projects:/private
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 500M

  service-follower:
    image: codeclarityce/service-package-follower
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    env_file:
      - .env.amqp
      - .env.database
      - .env.codeclarity
    volumes:
      - projects:/private
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 500M

  service-scheduler:
    image: codeclarityce/service-scheduler
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    env_file:
      - .env.amqp
      - .env.database
      - .env.codeclarity
    volumes:
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 500M
        reservations:
          cpus: '0.25'
          memory: 250M

  service-notifier:
    image: codeclarityce/service-notifier
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    env_file:
      - .env.amqp
      - .env.database
      - .env.codeclarity
    volumes:
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 500M
        reservations:
          cpus: '0.25'
          memory: 250M

  plugin-js-sbom:
    image: codeclarityce/plugin-js-sbom
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    env_file:
      - .env.amqp
      - .env.database
      - .env.plugin
    volumes:
      - projects:/private
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 500M
        reservations:
          cpus: '0.5'
          memory: 250M

  plugin-license-finder:
    image: codeclarityce/plugin-license-finder
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    env_file:
      - .env.amqp
      - .env.database
      - .env.plugin
    volumes:
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 500M
        reservations:
          cpus: '0.5'
          memory: 250M

  # plugin-js-patching:
  #   image: codeclarityce/plugin-js-patching
  #   restart: always
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy
  #     db:
  #       condition: service_started
  #     adminer:
  #       condition: service_started
  #   env_file:
  #     - .env.amqp
  #     - .env.database
  #     - .env.plugin
  #   volumes:
  #     - projects:/private
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '4'
  #         memory: 4G
  #       reservations:
  #         cpus: '2'
  #         memory: 2G

  plugin-vuln-finder:
    image: codeclarityce/plugin-vuln-finder
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    env_file:
      - .env.amqp
      - .env.database
      - .env.plugin
    volumes:
      - projects:/private
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  plugin-php-sbom:
    image: codeclarityce/plugin-php-sbom
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    env_file:
      - .env.amqp
      - .env.database
      - .env.plugin
    volumes:
      - projects:/private
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 500M
        reservations:
          cpus: '0.5'
          memory: 250M

  plugin-codeql:
    image: codeclarityce/plugin-codeql
    platform: linux/amd64 # CodeQL works only on x86 platforms
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    env_file:
      - .env.amqp
      - .env.database
      - .env.plugin
    volumes:
      - projects:/private
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  service-knowledge:
    image: codeclarityce/service-knowledge
    restart: always
    command: ["/home/codeclarity/knowledge/plugin", "-knowledge", "-action", "update", "-daemon"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    env_file:
      - .env.amqp
      - .env.database
      - .env.codeclarity
      - .env.knowledge
    volumes:
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          cpus: '1'
          memory: 2G

  prometheus:
    image: prom/prometheus:v3.8.1
    container_name: codeclarity-prometheus
    restart: always
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.external-url=http://localhost:9091'
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  grafana:
    image: grafana/grafana:12.3.0
    container_name: codeclarity-grafana
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.18.1
    container_name: codeclarity-postgres-exporter
    restart: always
    env_file:
      - .env.database
    depends_on:
      - db
    volumes:
      - ./certs/postgres:/var/lib/postgresql/certs:ro
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  rabbitmq_data:

  caddy_data:
  caddy_config:

  results_db_data_container:
  results_db_apps_data_container:
  db_data_container:

  projects:
  prometheus_data:
  grafana_data:
